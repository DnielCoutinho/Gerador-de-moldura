<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frame Studio Pro - Editor de Molduras EXIF Profissional</title>
    <meta name="description" content="Software profissional para adicionar molduras elegantes em fotografias com dados EXIF. Perfeito para fotógrafos.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style-new.css">
</head>
<body class="dark-mode">
    <header class="header">
        <div class="header__container">
            <div class="logo">
                <span class="logo__icon">🎬</span>
                <div>
                    <div class="logo__title">Frame Studio</div>
                    <div class="logo__subtitle">Pro</div>
                </div>
            </div>
            <nav class="header__nav">
                <button class="btn-icon" id="themeToggle" aria-label="Alternar tema" title="Alternar tema">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>
            </nav>
        </div>
    </header>

    <main class="app">
        <div class="app-grid">
            <aside class="sidebar">
                <div class="upload-zone" id="uploadZone">
                    <input type="file" id="fileInput" multiple accept="image/*" hidden aria-label="Selecionar imagens">
                    <div class="upload-zone__content">
                        <div class="upload-zone__icon">📸</div>
                        <h2 class="upload-zone__title">Arraste fotos</h2>
                        <p class="upload-zone__text">ou <button class="upload-zone__link" id="uploadBtn">clique</button></p>
                        <p class="upload-zone__hint">Até 50MB</p>
                    </div>
                </div>

                <div class="gallery-section" id="gallerySection" style="display: none;">
                    <div class="section-header">
                        <h3 class="section-title">Fotos</h3>
                        <button class="btn-icon btn-icon--small" id="clearGalleryBtn" title="Limpar todas">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            </svg>
                        </button>
                    </div>
                    <div class="gallery" id="gallery"></div>
                </div>

                <div class="exif-section" id="exifSection" style="display: none;">
                    <div class="section-header">
                        <h3 class="section-title">EXIF</h3>
                    </div>
                    <div class="exif-data" id="exifData"></div>
                </div>
            </aside>

            <div class="main-content">
                <div class="preview-container" id="previewContainer" style="display: none;">
                    <div class="preview-header">
                        <h2 class="preview-title">Pré-visualização</h2>
                        <div class="preview-controls">
                            <div class="zoom-control">
                                <button class="btn-icon" id="zoomOut" title="Diminuir zoom" aria-label="Diminuir zoom">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <circle cx="11" cy="11" r="8"></circle>
                                        <line x1="8" y1="11" x2="14" y2="11"></line>
                                    </svg>
                                </button>
                                <span class="zoom-level" id="zoomLevel">100%</span>
                                <button class="btn-icon" id="zoomIn" title="Aumentar zoom" aria-label="Aumentar zoom">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <circle cx="11" cy="11" r="8"></circle>
                                        <line x1="11" y1="8" x2="11" y2="14"></line>
                                        <line x1="8" y1="11" x2="14" y2="11"></line>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="preview-canvas-wrapper">
                        <canvas id="previewCanvas" class="preview-canvas"></canvas>
                    </div>
                </div>

                <div class="empty-state" id="emptyState">
                    <div class="empty-state__icon">🎨</div>
                    <h3 class="empty-state__title">Comece adicionando uma foto</h3>
                    <p class="empty-state__text">Selecione uma imagem para criar molduras profissionais</p>
                </div>
            </div>

            <aside class="control-panel">
                <div class="panel-scroll">
                    <div class="control-section">
                        <h3 class="control-section__title">Estilos</h3>
                        <div class="presets-container" id="presetsContainer"></div>
                    </div>

                    <div class="control-section">
                        <label class="control-label">Formato</label>
                        <div class="ratio-buttons" id="ratioButtons">
                            <button class="btn-ratio active" data-ratio="original">Original</button>
                            <button class="btn-ratio" data-ratio="16:9">16:9</button>
                            <button class="btn-ratio" data-ratio="4:3">4:3</button>
                            <button class="btn-ratio" data-ratio="1:1">1:1</button>
                            <button class="btn-ratio" data-ratio="3:2">3:2</button>
                            <button class="btn-ratio" data-ratio="9:16">9:16</button>
                            <button class="btn-ratio" data-ratio="3:4">3:4</button>
                            <button class="btn-ratio" data-ratio="2:3">2:3</button>
                        </div>
                    </div>

                    <div class="control-section">
                        <label class="control-label">Moldura</label>
                        
                        <div class="control-group">
                            <label class="sub-label">Cor</label>
                            <input type="color" id="frameColor" value="#B48A68" class="color-input" aria-label="Cor da moldura">
                        </div>

                        <div class="control-group">
                            <label class="sub-label">Espessura</label>
                            <div class="number-input-group">
                                <button class="btn-number" id="frameWidthDecrement">−</button>
                                <input type="number" id="frameWidth" value="40" min="0" max="200" class="number-input" aria-label="Espessura da moldura">
                                <button class="btn-number" id="frameWidthIncrement">+</button>
                            </div>
                            <input type="range" id="frameWidthSlider" min="0" max="200" value="40" class="slider">
                        </div>

                        <div class="control-group">
                            <label class="sub-label">Espaço Inferior</label>
                            <div class="number-input-group">
                                <button class="btn-number" id="bottomSpacingDecrement">−</button>
                                <input type="number" id="bottomSpacing" value="100" min="0" max="300" class="number-input" aria-label="Espaço inferior">
                                <button class="btn-number" id="bottomSpacingIncrement">+</button>
                            </div>
                            <input type="range" id="bottomSpacingSlider" min="0" max="300" value="100" class="slider">
                        </div>
                    </div>

                    <div class="control-section">
                        <label class="control-label">Texto</label>
                        
                        <div class="control-group">
                            <label class="sub-label">Cor</label>
                            <input type="color" id="textColor" value="#000000" class="color-input" aria-label="Cor do texto">
                        </div>

                        <div class="control-group">
                            <label class="sub-label">Estilo da Fonte</label>
                            <select id="fontFamily" class="number-input" style="width: 100%; cursor: pointer;">
                                <option value="Courier New">Retrô (Máquina de Escrever)</option>
                                <option value="Inter">Moderna (Clean)</option>
                                <option value="Merriweather">Clássica (Serifa)</option>
                                <option value="Arial">Básica</option>
                            </select>
                        </div>

                        <div class="control-group">
                            <label class="sub-label">Tamanho</label>
                            <div class="number-input-group">
                                <button class="btn-number" id="textSizeDecrement">−</button>
                                <input type="number" id="textSize" value="14" min="8" max="32" class="number-input" aria-label="Tamanho do texto">
                                <button class="btn-number" id="textSizeIncrement">+</button>
                            </div>
                            <input type="range" id="textSizeSlider" min="8" max="32" value="14" class="slider">
                        </div>

                        <div class="control-group">
                            <label class="sub-label">Alinhamento</label>
                            <div class="align-buttons">
                                <button class="btn-align" data-align="left" title="Esquerda" aria-label="Alinhar à esquerda">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <line x1="17" y1="10" x2="3" y2="10"></line>
                                        <line x1="21" y1="6" x2="3" y2="6"></line>
                                        <line x1="21" y1="14" x2="3" y2="14"></line>
                                        <line x1="17" y1="18" x2="3" y2="18"></line>
                                    </svg>
                                </button>
                                <button class="btn-align active" data-align="center" title="Centro" aria-label="Centralizar">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <line x1="18" y1="10" x2="6" y2="10"></line>
                                        <line x1="21" y1="6" x2="3" y2="6"></line>
                                        <line x1="21" y1="14" x2="3" y2="14"></line>
                                        <line x1="18" y1="18" x2="6" y2="18"></line>
                                    </svg>
                                </button>
                                <button class="btn-align" data-align="right" title="Direita" aria-label="Alinhar à direita">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <line x1="21" y1="10" x2="7" y2="10"></line>
                                        <line x1="21" y1="6" x2="3" y2="6"></line>
                                        <line x1="21" y1="14" x2="3" y2="14"></line>
                                        <line x1="21" y1="18" x2="7" y2="18"></line>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="control-section">
                        <div class="control-group">
                            <label class="sub-label">Qualidade Final</label>
                            <select id="exportQuality" class="number-input" style="width: 100%; margin-bottom: 10px; cursor: pointer;">
                                <option value="1.0">Máxima (Sem perdas - Arquivo maior)</option>
                                <option value="0.8" selected>Alta (Recomendado para Redes)</option>
                                <option value="0.6">Comprimida (Web - Arquivo menor)</option>
                            </select>
                        </div>

                        <button class="btn btn-primary btn-full" id="exportBtn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                            Exportar JPG
                        </button>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <div class="toast" id="toast" role="alert" aria-live="polite" aria-atomic="true"></div>
    <div class="loading-overlay" id="loadingOverlay" style="display: none;">
        <div class="spinner"></div>
    </div>

    <script src="js/exif-pro.js"></script>
    <script src="js/canvas.js"></script>
    <script src="js/ui-pro.js"></script>
    <script src="js/app-pro.js"></script>
</body>
</html>
